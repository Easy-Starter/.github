name: Bug report
description: Report a reproducible problem in an Easy Starter repository.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Remove credentials and private data before submitting.
  - type: input
    id: repository
    attributes:
      label: Affected repository
      placeholder: easy-starter-nextjs-web-app
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v1.0.0 or commit SHA
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Problem summary
      description: What happened, and why is it a problem?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction
      description: Provide exact steps, commands, and a minimal repository or code sample when possible.
      placeholder: |
        1. Create a repository from the template
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: OS, runtime versions, package manager, browser/device, deployment target
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues.
          required: true
        - label: I reproduced this on the latest supported version.
          required: true
        - label: I removed credentials and private data.
          required: true
