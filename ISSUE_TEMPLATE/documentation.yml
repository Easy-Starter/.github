name: Documentation issue
description: Report missing, unclear, incorrect, or outdated documentation.
title: "[Docs]: "
labels: ["documentation", "triage"]
body:
  - type: input
    id: location
    attributes:
      label: Page or file
      placeholder: URL or repository path
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What is unclear or incorrect?
    validations:
      required: true
  - type: textarea
    id: improvement
    attributes:
      label: Suggested improvement
  - type: dropdown
    id: language
    attributes:
      label: Language
      options:
        - English
        - Persian
        - Both
    validations:
      required: true
